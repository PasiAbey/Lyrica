name: Lyrica CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build the backend image
      run: docker build -t lyrica-backend ./backend

    - name: Build the frontend image
      run: docker build -t lyrica-frontend ./frontend

    - name: run containers (test)
      run: docker compose up -d --build

    - name: check the running containers
      run: docker ps
    
    - name: Add Version Tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push backend image
      run: |
        docker tag lyrica-backend ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:$IMAGE_TAG

    - name: Push frontend image
      run: |
        docker tag lyrica-frontend ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:$IMAGE_TAG
        docker push ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:$IMAGE_TAG

    
    # Login to AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Deploy to AWS using using SSH
    - name: Deploy to AWS EC2
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters '{
            "commands": [
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:${{ github.sha }} || true",
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:${{ github.sha }} || true",
              "sudo docker stop frontend || true",
              "sudo docker rm frontend || true",
              "sudo docker stop backend || true",
              "sudo docker rm backend || true",
              "sudo docker run -d --name backend --network lyrica-network -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:${{ github.sha }}",
              "sudo docker run -d --name frontend --network lyrica-network -p 80:80 ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:${{ github.sha }}"
            ]
          }' \
          --query "Command.CommandId" \
          --output text \
          --region ${{ secrets.AWS_REGION }})

          echo "Command ID: $COMMAND_ID"
          echo "Version: ${{ github.sha }}"

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }}

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'StandardOutputContent' \
            --output text

    - name: Health check
      run: |
        echo "Waiting for the application to start"
        sleep 10

        echo "Checking backend health"
        for i in {1..5}; do
          if curl -f https://${{ secrets.EC2_PUBLIC_IP}}; then
            echo "Backend is up and running"
            exit 0
          fi
            echo "attempt $i, retrying in 5 seconds..."
            sleep 5
        done
        echo "Health check failed"
        exit 1

    - name: Save deployed version
      if: success()
      run: |
        aws ssm put-parameter \
          --name "/lyrica/current-version" \
          --value "$IMAGE_TAG" \
          --type String \
          --overwrite \
          --region ${{ secrets.AWS_REGION }}

    - name: Rollback on failure
      if: failure()
      run: |
        PREVIOUS_VERSION=$(aws ssm get-parameter \
          --name "/lyrica/current-version" \
          --query "Parameter.Value" \
          --output text \
          --region ${{ secrets.AWS_REGION }})
        
        echo "Rolling back to previous version: $PREVIOUS_VERSION"

        RB_COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters {
            "commands: [
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:$PREVIOUS_VERSION",
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:$PREVIOUS_VERSION",
              "sudo docker stop frontend || true",
              "sudo docker rm frontend || true",
              "sudo docker stop backend || true",
              "sudo docker rm backend || true",
              "sudo docker run -d --name backend --network lyrica-network -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:$PREVIOUS_VERSION",
              "sudo docker run -d --name frontend --network lyrica-network -p 80:80 ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:$PREVIOUS_VERSION"
            ]""
          } \
          --query "Command.CommandId" \
          --output text \
          --region ${{ secrets.AWS_REGION }})
        

        aws ssm wait command-executed \
            --command-id $RB_COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }}

        aws ssm get-command-invocation \
            --command-id $RB_COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'StandardErrorContent' \
            --output text

          echo "Rollback completed"
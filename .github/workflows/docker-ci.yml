name: Lyrica CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build the backend image
      run: docker build -t lyrica-backend ./backend

    - name: Build the frontend image
      run: docker build -t lyrica-frontend ./frontend

    - name: run containers (test)
      run: docker compose up -d --build

    - name: check the running containers
      run: docker ps



    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push backend image
      run: |
        docker tag lyrica-backend ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/lyrica-backend:latest

    - name: Push frontend image
      run: |
        docker tag lyrica-frontend ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/lyrica-frontend:latest

    
    #Login to AWS
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
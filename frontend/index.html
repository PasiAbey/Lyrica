<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyrica — Song Library</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nova+Round&family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body id="indexPage">

  <div class="song-container">
    <!-- Home / Library View -->
    <div id="homeView" class="home-view">
      <!-- Search and Header Section -->
      <header class="library-header">
        <h1 class="brand-title">Lyrica</h1>
        <div class="search-bar-container">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5"
            fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search songs, artists...">
          <button id="btnClearSearch" class="clear-search-btn hidden" title="Clear Search">&times;</button>
        </div>
      </header>

      <div id="songsGrid" class="songs-grid hidden">
        <!-- Dynamically rendered search results from app.js -->
      </div>
    </div>
  </div>

  <!-- Collapsible History Sidebar Drawer -->
  <div id="historySidebar" class="history-sidebar closed">
    <div class="sidebar-header">
      <h2>Recently Viewed</h2>
      <button id="btnCloseHistory" class="close-sidebar-btn">&times;</button>
    </div>
    <div id="historyList" class="history-list">
      <p class="empty-history">No songs viewed yet</p>
    </div>
  </div>
  <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

  <!-- Floating Audio Player Bar -->
  <div id="audioPlayerBar" class="audio-player-bar hidden">
    <div class="player-left">
      <img id="playerCover" class="player-cover" src="https://placehold.co/100x100/100c1e/ffffff?text=Cover"
        alt="Cover">
      <div class="player-meta">
        <h4 id="playerTitle" class="player-title">Song Title</h4>
        <p id="playerArtist" class="player-artist">Artist Name</p>
      </div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button id="btnPlayPause" class="player-control-btn" title="Play/Pause">
          <svg id="iconPlay" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
            fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          <svg id="iconPause" class="hidden" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
            stroke-width="2" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" />
            <rect x="14" y="4" width="4" height="16" />
          </svg>
        </button>
      </div>
      <div class="player-timeline-container">
        <span id="playerCurrentTime" class="player-time">0:00</span>
        <input type="range" id="playerTimeline" class="player-timeline" min="0" value="0" max="100">
        <span id="playerDuration" class="player-time">0:30</span>
      </div>
    </div>

    <div class="player-right">
      <div class="player-volume-container">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
        </svg>
        <input type="range" id="playerVolume" class="player-volume" min="0" max="1" step="0.05" value="0.8">
      </div>
      <div class="visualizer-container">
        <canvas id="visualizerCanvas" width="120" height="40"></canvas>
      </div>
    </div>
  </div>

  <!-- Environment Config: sets window.API_BASE. See config.example.js for setup -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyrica — Song Details</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="song-container">
    <!-- Lyrics View -->
    <div id="lyricsView" class="lyrics-view">
      <div class="lyrics-nav-header">
        <a href="index.html" id="btnBack" class="back-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          <span>Back to Library</span>
        </a>
        <button id="btnToggleHistory" class="history-toggle-btn" title="Toggle History">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>History</span>
        </button>
      </div>
      
      <header class="song-header">
        <img id="coverPhoto" class="cover-photo" src="" alt="Album Cover">
        <div class="meta-details">
          <h1 id="songTitle" class="song-title">Song Title</h1>
          <p id="artistName" class="artist-name">Artist Name</p>
          <button id="btnPlayDetails" class="play-details-btn">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>Play Preview</span>
          </button>
        </div>
      </header>
      
      <div id="lyricsContent" class="lyrics-content">Lyrics loading...</div>
    </div>
  </div>

  <!-- Collapsible History Sidebar Drawer (Shared for navigation) -->
  <div id="historySidebar" class="history-sidebar closed">
    <div class="sidebar-header">
      <h2>Recently Viewed</h2>
      <button id="btnCloseHistory" class="close-sidebar-btn">&times;</button>
    </div>
    <div id="historyList" class="history-list">
      <p class="empty-history">No songs viewed yet</p>
    </div>
  </div>
  <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

  <!-- Floating Audio Player Bar -->
  <div id="audioPlayerBar" class="audio-player-bar hidden">
    <div class="player-left">
      <img id="playerCover" class="player-cover" src="https://placehold.co/100x100/100c1e/ffffff?text=Cover" alt="Cover">
      <div class="player-meta">
        <h4 id="playerTitle" class="player-title">Song Title</h4>
        <p id="playerArtist" class="player-artist">Artist Name</p>
      </div>
    </div>
    
    <div class="player-center">
      <div class="player-controls">
        <button id="btnPlayPause" class="player-control-btn" title="Play/Pause">
          <svg id="iconPlay" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg id="iconPause" class="hidden" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
      </div>
      <div class="player-timeline-container">
        <span id="playerCurrentTime" class="player-time">0:00</span>
        <input type="range" id="playerTimeline" class="player-timeline" min="0" value="0" max="100">
        <span id="playerDuration" class="player-time">0:30</span>
      </div>
    </div>
    
    <div class="player-right">
      <div class="player-volume-container">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" id="playerVolume" class="player-volume" min="0" max="1" step="0.05" value="0.8">
      </div>
      <div class="visualizer-container">
        <canvas id="visualizerCanvas" width="120" height="40"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
